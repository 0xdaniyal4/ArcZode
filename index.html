    <!-- Prevent wallet extension conflicts from crashing the app due to window.ethereum redefinition -->
    <script>
      (function() {
        try {
          const originalDefineProperty = Object.defineProperty;
          Object.defineProperty = function(obj, prop, descriptor) {
            if (prop === 'ethereum' && obj === window) {
              try {
                return originalDefineProperty.apply(this, arguments);
              } catch (e) {
                console.warn("Prevented crash from wallet extension trying to redefine window.ethereum:", e);
                // Safely attempt a regular assignment if a value or getter exists
                try {
                  if (descriptor) {
                    const val = descriptor.value !== undefined ? descriptor.value : (typeof descriptor.get === 'function' ? descriptor.get() : undefined);
                    if (val !== undefined) {
                      window.ethereum = val;
                    }
                  }
                } catch (err) {
                  console.warn("Failed to assign fallback value to window.ethereum:", err);
                }
                return obj;
              }
            }
            return originalDefineProperty.apply(this, arguments);
          };
        } catch (globalError) {
          console.error("Failed to inject ethereum redefinition guard:", globalError);
        }
      })();
    </script>
